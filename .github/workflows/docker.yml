name: Docker

on:
  push:
    branches:
      - main
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.apps }}
      version: ${{ steps.filter.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine which apps to build
        id: filter
        run: |
          ALL='["cellar","sipp","feeds","parcels","jotts","og","shrink","backup"]'

          # Map cargo package names to directory names
          pkg_to_dir() {
            case "$1" in
              sipp-so) echo "sipp" ;;
              *) echo "$1" ;;
            esac
          }

          # Tags: per-app (app/version) or bare (version)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"

            if [[ "$TAG" == */* ]]; then
              PKG="${TAG%/*}"
              VERSION="${TAG##*/}"
              APP=$(pkg_to_dir "$PKG")
              echo "apps=[\"${APP}\"]" >> "$GITHUB_OUTPUT"
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            else
              echo "apps=${ALL}" >> "$GITHUB_OUTPUT"
              echo "version=${TAG}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          changed=$(git diff --name-only HEAD~1 HEAD)

          # Workspace-level changes (shared deps, auth crate, CI) rebuild all
          if echo "$changed" | grep -qE '^(Cargo\.(toml|lock)|crates/|\.github/workflows/docker\.yml)'; then
            echo "apps=${ALL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          apps=()
          for app in cellar sipp feeds parcels jotts og shrink backup; do
            if echo "$changed" | grep -q "^apps/${app}/"; then
              apps+=("\"${app}\"")
            fi
          done

          if [ ${#apps[@]} -eq 0 ]; then
            echo 'apps=[]' >> "$GITHUB_OUTPUT"
          else
            echo "apps=[$(IFS=,; echo "${apps[*]}")]" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build (${{ matrix.app }})
    needs: changes
    if: needs.changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=${{ needs.changes.outputs.version }},enable=${{ needs.changes.outputs.version != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
